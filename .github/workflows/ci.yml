name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CACHE_VERSION: 1

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    name: Frontend Lint & Types
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: ESLint
        run: npm run lint
      
      - name: TypeScript Check
        run: npm run types
      
      - name: Format Check
        run: npm run format:check

  lint-backend:
    runs-on: ubuntu-latest
    name: Backend Lint
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite
          ini-values: error_reporting=E_ALL
          tools: composer:v2
      
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - run: composer install -q --no-ansi --no-interaction --no-scripts --prefer-dist
      
      - name: Laravel Pint
        run: ./vendor/bin/pint --test

  test-backend:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite
          ini-values: error_reporting=E_ALL
          tools: composer:v2
      
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - run: composer install -q --no-ansi --no-interaction --no-scripts --prefer-dist
      
      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force --database=sqlite
      
      - name: Run Pest tests
        run: php artisan test --env=testing

  build-frontend:
    runs-on: ubuntu-latest
    name: Frontend Build
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Build
        run: npm run build

  summary:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, test-backend, build-frontend]
    if: always()
    name: CI Summary
    
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint-frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.test-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.build-frontend.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"
